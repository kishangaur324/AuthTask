apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base/api
  - ../../base/db
  - ../../base/ingress
  - namespace.yaml
  - secret-store.yaml
  - external-secret.yaml

patches:
  - path: patches/api-patch.yaml
    target:
      kind: Deployment
      name: auth-api
    
  - path: patches/ingress-patch.yaml
    target:
      kind: Ingress
      name: api-ingress