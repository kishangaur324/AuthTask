openapi: 3.0.3
info:
  title: AuthTask API
  version: "1.1.1"
  description: >
    OpenAPI contract aligned with current controllers, validators, and result mapping.
    This spec includes only status codes explicitly anticipated by the current API code.

servers:
  - url: https://localhost:7111
    description: Local HTTPS
  - url: http://localhost:5043
    description: Local HTTP

tags:
  - name: Auth
    description: Registration and authentication endpoints.
  - name: Employee
    description: Employee management endpoints.

paths:
  /api/Auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a new user
      description: Requires `X-API-KEY` and uses auth-specific rate limiting.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: User registered successfully.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRegisterResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: API key is missing.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"
        "403":
          description: API key is invalid.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"
        "409":
          description: Conflict (for example duplicate username/email).
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          description: Internal server error.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiResponseRegisterResponse"
                  - $ref: "#/components/schemas/ApiResponseString"

  /api/Auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Authenticate and get JWT token
      description: Requires `X-API-KEY` and uses auth-specific rate limiting.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/LoginRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseLoginResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: API key is missing or credentials are invalid.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiResponseString"
                  - $ref: "#/components/schemas/ApiResponseLoginResponse"
        "403":
          description: API key is invalid.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          description: Internal server error.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"

  /api/Employee/update:
    put:
      tags: [Employee]
      operationId: updateEmployee
      summary: Update employee details
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeDto"
      responses:
        "204":
          description: Employee updated successfully.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedBearer"
        "404":
          description: Employee not found.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          description: Internal server error.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"

  /api/Employee/{id}:
    get:
      tags: [Employee]
      operationId: getEmployeeById
      summary: Get employee by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200":
          description: Employee retrieved successfully.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseEmployeeDto"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: Missing/invalid bearer token or business-level unauthorized access.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProblemDetails"
                  - $ref: "#/components/schemas/ApiResponseEmployeeDto"
        "404":
          description: Employee not found.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseEmployeeDto"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          description: Internal server error.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseEmployeeDto"

    delete:
      tags: [Employee]
      operationId: deleteEmployee
      summary: Delete employee by ID
      description: Requires authenticated user with `admin` role.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "204":
          description: Employee deleted successfully.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedBearer"
        "403":
          $ref: "#/components/responses/ForbiddenBearer"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          description: Internal server error.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"

  /api/Employee/list:
    post:
      tags: [Employee]
      operationId: getEmployees
      summary: Get paginated employee list
      description: Requires authenticated user with `admin` role.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaginationRequest"
      responses:
        "200":
          description: Employee list retrieved successfully.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponsePaginationResponseEmployeeDto"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedBearer"
        "403":
          $ref: "#/components/responses/ForbiddenBearer"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          description: Internal server error.
          headers:
            X-Tracking-Id:
              $ref: "#/components/headers/XTrackingId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponsePaginationResponseEmployeeDto"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT bearer token in `Authorization: Bearer <token>`."
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: API key for auth endpoints.

  headers:
    XTrackingId:
      description: Request tracking identifier added by middleware.
      schema:
        type: string

  parameters:
    EmployeeId:
      name: id
      in: path
      required: true
      description: Employee identifier.
      schema:
        type: string
        format: uuid

  responses:
    ValidationError:
      description: Request validation failed.
      headers:
        X-Tracking-Id:
          $ref: "#/components/headers/XTrackingId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationProblemDetails"

    UnauthorizedBearer:
      description: Unauthorized. Missing or invalid JWT bearer token.
      headers:
        X-Tracking-Id:
          $ref: "#/components/headers/XTrackingId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    ForbiddenBearer:
      description: Forbidden. Authenticated user lacks required permission/role.
      headers:
        X-Tracking-Id:
          $ref: "#/components/headers/XTrackingId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    TooManyRequests:
      description: Too many requests. Rate limit exceeded.
      headers:
        X-Tracking-Id:
          $ref: "#/components/headers/XTrackingId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^\da-zA-Z]).{8,15}$'
          minLength: 8
          maxLength: 15
        role:
          type: string
          enum: [admin, employee]
      required: [email, password, role]

    RegisterResponse:
      type: object
      properties:
        employeeId:
          type: string
          format: uuid
        email:
          type: string
          format: email
      required: [employeeId, email]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^\da-zA-Z]).{8,15}$'
          minLength: 8
          maxLength: 15
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
      required: [accessToken]

    UpdateEmployeeDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employeeCode:
          type: string
          maxLength: 20
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          pattern: '^\+?[0-9]{8,15}$'
        departmentId:
          type: string
          format: uuid
          nullable: true
        managerId:
          type: string
          format: uuid
          nullable: true
        dateOfJoining:
          type: string
          format: date-time
        dateOfLeaving:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
      required:
        - id
        - employeeCode
        - firstName
        - lastName
        - email
        - phoneNumber
        - dateOfJoining
        - isActive

    EmployeeDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employeeCode:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        dateOfJoining:
          type: string
          format: date-time
        dateOfLeaving:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
      required:
        - id
        - employeeCode
        - firstName
        - lastName
        - email
        - phoneNumber
        - dateOfJoining
        - isActive

    PaginationRequest:
      type: object
      properties:
        pageNumber:
          type: integer
          format: int32
          minimum: 1
          example: 1
        pageSize:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 10
          example: 10
        search:
          type: string
          nullable: true
          maxLength: 100
          example: john
        skip:
          type: integer
          format: int32
          readOnly: true
      required: [pageNumber]

    PaginationResponseEmployeeDto:
      type: object
      properties:
        totalCount:
          type: integer
          format: int32
        items:
          type: array
          items:
            $ref: "#/components/schemas/EmployeeDto"
      required: [totalCount, items]

    ApiResponseString:
      type: object
      properties:
        data:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    ApiResponseRegisterResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/RegisterResponse"
        error:
          type: string
          nullable: true

    ApiResponseLoginResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/LoginResponse"
        error:
          type: string
          nullable: true

    ApiResponseEmployeeDto:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/EmployeeDto"
        error:
          type: string
          nullable: true

    ApiResponsePaginationResponseEmployeeDto:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/PaginationResponseEmployeeDto"
        error:
          type: string
          nullable: true

    ValidationProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
      additionalProperties: true
