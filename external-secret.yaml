apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-db-secret
  namespace: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore

  target:
    name: auth-db-secret

  data:
    - secretKey: ConnectionStrings__Default
      remoteRef:
        key: dev/auth-task
        property: ConnectionStrings__Default
    
    - secretKey: JwtConfig__SecretKey
      remoteRef:
        key: dev/auth-task
        property: JwtConfig__SecretKey

    - secretKey: ApiKey
      remoteRef:
        key: dev/auth-task
        property: ApiKey