version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authtask-api
    ports: 
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=authtask-db;User Id=postgres;Password=AuthTask324@;
    depends_on:
      db:
        condition: service_healthy
        
  db:
    image: postgres:16
    container_name: authtask-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: AuthTask324@
      POSTGRES_DB: authtask-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: